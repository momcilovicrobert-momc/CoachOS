<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachOS — Nina</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0d; --surface:#141414; --surface2:#1c1c1c; --border:#2a2a2a;
  --accent:#c8f135; --text:#f0f0f0; --muted:#666; --muted2:#444;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;}

/* Header & Typography */
.header{padding:18px 20px; display:flex; align-items:center; justify-content:space-between;}
.logo-text{font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1px;}
.logo-text span{color:var(--accent);}
.avatar{width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#a78bfa,#7c3aed); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700;}

.greeting{padding:10px 20px 20px;}
.greeting-name{font-family:'Bebas Neue',sans-serif; font-size:38px; line-height:1;}
.greeting-name span{color:var(--accent);}

/* Tabs / Switcher */
.mode-switcher{display:flex; gap:8px; padding:0 20px; margin-bottom:20px;}
.mode-btn{flex:1; padding:12px; border-radius:14px; border:1px solid var(--border); background:var(--surface); color:var(--muted); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s;}
.mode-btn.active{background:var(--accent); color:#0d0d0d; border-color:var(--accent);}
.mode-btn.loading{opacity: 0.6; cursor: wait;}

/* Workout List */
.workout-list{padding:0 20px 100px;}
.ex-card{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; cursor:pointer;}
.ex-card:active{transform:scale(0.98); background:var(--surface2);}
.ex-name{font-weight:600; font-size:15px; margin-bottom:4px;}
.ex-meta{font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace;}
.status-msg{text-align:center; padding:40px; color:var(--muted); font-size:14px;}

/* Modal / Overlay */
.overlay{position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:99; display:none;}
.log-sheet{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:#1a1a1a; border-radius:20px 20px 0 0; padding:25px; z-index:100; display:none; border-top:1px solid var(--border);}
.log-input{width:100%; padding:12px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:white; margin-bottom:12px; font-size:16px;}
.save-btn{width:100%; padding:15px; background:var(--accent); color:#0d0d0d; border:none; border-radius:12px; font-weight:700; cursor:pointer; font-size:15px;}
</style>
</head>
<body>

<div class="header">
    <div class="logo-text">COACH<span>OS</span></div>
    <div class="avatar">NI</div>
</div>

<div class="greeting">
    <div class="greeting-name">HEJ, <span>NINA.</span></div>
</div>

<div class="mode-switcher">
    <button class="mode-btn active" id="gymBtn" onclick="changeMode('gym')">🏢 Gym</button>
    <button class="mode-btn" id="homeBtn" onclick="changeMode('home')">🏠 Home</button>
</div>

<div class="workout-list" id="workout-container">
    <div class="status-msg">Povezava s tabelo...</div>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="log-sheet" id="log-sheet">
    <h3 id="sheet-ex-name" style="margin-bottom:15px; font-family:'Bebas Neue'; letter-spacing:1px; font-size:24px;">Vaja</h3>
    <input type="number" id="log-weight" placeholder="Teža (kg)" class="log-input">
    <input type="number" id="log-reps" placeholder="Ponovitve" class="log-input">
    <button class="save-btn" onclick="submitLog()">SHRANI REZULTAT ↗</button>
</div>

<script>
const CLIENT_NAME = 'Nina';
const scriptURL = 'https://script.google.com/macros/s/AKfycbwdx8hU4EqHM6Ot5swbPmMl-h6PwR78GiyR-s4yd1ysx6CieRrJjQYa1SB6Alcmw4gh/exec';
let currentType = 'gym';
let selectedEx = '';

async function loadProgram() {
    const container = document.getElementById('workout-container');
    const gymBtn = document.getElementById('gymBtn');
    const homeBtn = document.getElementById('homeBtn');
    
    // Vizualni feedback za nalaganje
    gymBtn.classList.add('loading');
    homeBtn.classList.add('loading');
    
    try {
        const res = await fetch(`${scriptURL}?action=getProgram&client=${CLIENT_NAME}&type=${currentType}`);
        const data = await res.json();
        
        if (data.program && data.program.trim() !== "") {
            renderProgram(data.program);
        } else {
            container.innerHTML = `<div class="status-msg">Trenutno nimaš vpisanih vaj za ${currentType}.</div>`;
        }
    } catch (e) {
        container.innerHTML = `<div class="status-msg" style="color:#ff6b35;">Napaka pri povezavi. Preveri tabelo.</div>`;
    } finally {
        gymBtn.classList.remove('loading');
        homeBtn.classList.remove('loading');
    }
}

function renderProgram(text) {
    const container = document.getElementById('workout-container');
    container.innerHTML = '';
    const lines = text.split('\n');
    
    lines.forEach(line => {
        if (line.includes('|')) {
            const p = line.split('|');
            const card = document.createElement('div');
            card.className = 'ex-card';
            card.onclick = () => openSheet(p[0].trim());
            card.innerHTML = `
                <div>
                    <div class="ex-name">${p[0].trim()}</div>
                    <div class="ex-meta">${p[1]?.trim() || '0'} SERIJE | ${p[2]?.trim() || '0'} PONOVITEV</div>
                </div>
                <div style="color:var(--muted2);">›</div>
            `;
            container.appendChild(card);
        }
    });
}

function changeMode(mode) {
    if (document.getElementById('gymBtn').classList.contains('loading')) return;
    currentType = mode;
    document.getElementById('gymBtn').classList.toggle('active', mode === 'gym');
    document.getElementById('homeBtn').classList.toggle('active', mode === 'home');
    loadProgram();
}

function openSheet(name) {
    selectedEx = name;
    document.getElementById('sheet-ex-name').innerText = name;
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('log-sheet').style.display = 'block';
}

function closeSheet() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('log-sheet').style.display = 'none';
}

async function submitLog() {
    const w = document.getElementById('log-weight').value;
    const r = document.getElementById('log-reps').value;
    if(!w || !r) return alert('Vpiši težo in ponovitve!');

    const btn = document.querySelector('.save-btn');
    btn.innerText = 'POŠILJAM...';
    btn.disabled = true;

    try {
        const payload = {
            action: 'logWorkout',
            client: CLIENT_NAME,
            exercise: selectedEx,
            weight: w,
            reps: r
        };

        await fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors', // Nujno za Google Apps Script POST
            body: JSON.stringify(payload) 
        });
        
        alert('Uspešno shranjeno!');
        closeSheet();
        document.getElementById('log-weight').value = '';
        document.getElementById('log-reps').value = '';
    } catch(e) {
        alert('Napaka pri shranjevanju.');
    } finally {
        btn.innerText = 'SHRANI REZULTAT ↗';
        btn.disabled = false;
    }
}

window.onload = loadProgram;
</script>
</body>
</html>
