<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachOS — Nina</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0d; --surface:#141414; --surface2:#1c1c1c; --border:#2a2a2a;
  --accent:#c8f135; --accent2:#ff6b35; --text:#f0f0f0; --muted:#666; --muted2:#444;
  --red:#ff4444; --blue:#4488ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;}
.header{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between;}
.logo-row{display:flex;align-items:center;gap:8px;}
.logo-mark{width:26px;height:26px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:14px;height:14px;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;}
.logo-text span{color:var(--accent);}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.greeting{padding:20px 20px 0;}
.greeting-sub{font-size:11px;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;font-weight:600;margin-bottom:3px;}
.greeting-name{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;letter-spacing:1px;}
.greeting-name span{color:var(--accent);}
.checkin-card{margin:16px 20px 0;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;position:relative;overflow:hidden;}
.checkin-title{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.checkin-saved{font-size:10px;color:var(--accent);font-weight:500;letter-spacing:0;text-transform:none;display:none;}
.checkin-row{margin-bottom:14px;}
.checkin-label{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:500;}
.sleep-row{display:flex;align-items:center;gap:10px;}
.sleep-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--border);outline:none;}
.sleep-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 0 3px rgba(200,241,53,0.2);}
.emoji-row{display:flex;gap:8px;}
.emoji-btn{flex:1;padding:10px 4px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);text-align:center;cursor:pointer;transition:all .15s;font-size:20px;}
.emoji-btn.selected{background:rgba(200,241,53,0.1);border-color:var(--accent);transform:scale(1.08);}
.emoji-label{font-size:9px;color:var(--muted);margin-top:3px;display:block;}
.checkin-note{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;resize:none;min-height:60px;transition:border .15s;}
.checkin-note:focus{outline:none;border-color:rgba(200,241,53,0.4);}
.checkin-note::placeholder{color:var(--muted2);}
.checkin-save-btn{width:100%;margin-top:10px;padding:10px;background:rgba(200,241,53,0.1);border:1px solid rgba(200,241,53,0.25);border-radius:10px;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.checkin-save-btn:hover{background:rgba(200,241,53,0.18);}
.content{padding:0 20px 100px;}
.section{margin-top:20px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.section-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.week-strip{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.week-strip::-webkit-scrollbar{display:none;}
.day-chip{flex-shrink:0;width:52px;padding:10px 6px;border-radius:14px;background:var(--surface);border:1px solid var(--border);text-align:center;cursor:pointer;transition:all .15s;}
.day-chip.today{background:var(--accent);border-color:var(--accent);}
.day-chip.today .day-name,.day-chip.today .day-num,.day-chip.today .day-type{color:#0d0d0d!important;}
.day-name{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:0.5px;}
.day-num{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1.1;margin:1px 0;}
.day-type{font-size:9px;color:var(--muted);}
.session-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.exercise-row{padding:13px 18px;border-bottom:1px solid rgba(42,42,42,0.6);display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .1s;}
.ex-num{width:26px;height:26px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--muted);flex-shrink:0;}
.ex-num.logged{background:rgba(200,241,53,0.12);border-color:var(--accent);color:var(--accent);}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ex-prescription{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px;}
.ex-chevron{color:var(--muted2);font-size:16px;flex-shrink:0;}

/* SWITCHER STYLE */
.mode-switcher{display:flex;gap:0;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:4px;}
.mode-btn{flex:1;padding:10px 8px;border-radius:10px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.mode-btn.active{background:var(--accent);color:#0d0d0d;}
.mode-btn.processing{opacity: 0.5; cursor: wait;}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:10px 0 18px;z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
.nav-btn.active .nav-btn-label{color:var(--accent);}
.nav-btn-label{font-size:10px;color:var(--muted);font-weight:500;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:199;display:none;}
.log-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#1a1a1a;border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 20px 40px;z-index:200;display:none;}
.log-btn{width:100%;padding:14px;background:var(--accent);color:#0d0d0d;border:none;border-radius:12px;font-weight:700;cursor:pointer;margin-top:15px;}
</style>
</head>
<body>

<div class="header">
  <div class="logo-text">COACH<span>OS</span></div>
  <div class="avatar">NI</div>
</div>

<div class="greeting">
  <div class="greeting-sub" id="greeting-date">—</div>
  <div class="greeting-name">Hej, <span>Nina.</span></div>
</div>

<div class="content">
    <div class="section">
        <div class="mode-switcher">
            <button class="mode-btn active" id="gymBtn" onclick="setWorkoutMode('gym')">🏢 Gym</button>
            <button class="mode-btn" id="homeBtn" onclick="setWorkoutMode('home')">🏠 Home</button>
        </div>
        <div id="workout-container">Nalaganje...</div>
    </div>
</div>

<nav class="bottom-nav">
  <div class="nav-btn active">
    <div class="nav-btn-label">Danes</div>
  </div>
</nav>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="log-sheet" id="log-sheet">
    <h3 id="sheet-ex-name">Vaja</h3>
    <div id="sheet-inputs" style="margin-top:15px;">
        <input type="number" id="log-weight" placeholder="kg" style="width:100%; padding:10px; margin-bottom:10px; background:#222; border:1px solid #444; color:white;">
        <input type="number" id="log-reps" placeholder="ponovitve" style="width:100%; padding:10px; background:#222; border:1px solid #444; color:white;">
    </div>
    <button class="log-btn" onclick="submitLog()">Shrani ↗</button>
</div>

<script>
const CLIENT_NAME = 'Nina';
const scriptURL = 'https://script.google.com/macros/s/AKfycbwdx8hU4EqHM6Ot5swbPmMl-h6PwR78GiyR-s4yd1ysx6CieRrJjQYa1SB6Alcmw4gh/exec';
let isHomeWorkout = false;
let currentEx = '';

async function loadProgramFromSheets() {
    const container = document.getElementById('workout-container');
    const gymBtn = document.getElementById('gymBtn');
    const homeBtn = document.getElementById('homeBtn');
    const type = isHomeWorkout ? 'home' : 'gym';
   
    container.innerHTML = '<div style="text-align:center; padding:20px; color:#666;">Povezava s tabelo...</div>';
   
    try {
        const resp = await fetch(`${scriptURL}?action=getProgram&client=${CLIENT_NAME}&type=${type}`);
        const data = await resp.json();
       
        if (data.program) {
            renderProgram(data.program);
        } else {
            container.innerHTML = '<div style="text-align:center; padding:20px;">Danes ni treninga.</div>';
        }
    } catch (e) {
        container.innerHTML = '<div style="text-align:center; padding:20px; color:red;">Napaka pri nalaganju.</div>';
    } finally {
        // ODKLENI GUMBE NE GLEDE NA REZULTAT
        gymBtn.classList.remove('processing');
        homeBtn.classList.remove('processing');
        if(isHomeWorkout) {
            homeBtn.classList.add('active'); gymBtn.classList.remove('active');
        } else {
            gymBtn.classList.add('active'); homeBtn.classList.add('active');
        }
    }
}

function renderProgram(text) {
    const container = document.getElementById('workout-container');
    container.innerHTML = '';
    const lines = text.split('\n');
   
    lines.forEach(line => {
        if (line.includes('|')) {
            const parts = line.split('|');
            const name = parts[0].trim();
            const card = document.createElement('div');
            card.className = 'exercise-row';
            card.onclick = () => openSheet(name);
            card.innerHTML = `
                <div class="ex-num">•</div>
                <div class="ex-info">
                    <div class="ex-name">${name}</div>
                    <div class="ex-prescription">${parts[1].trim()} serije | ${parts[2].trim()} pon.</div>
                </div>
                <div class="ex-chevron">›</div>
            `;
            container.appendChild(card);
        }
    });
}

function setWorkoutMode(mode) {
    const gymBtn = document.getElementById('gymBtn');
    const homeBtn = document.getElementById('homeBtn');
   
    if (gymBtn.classList.contains('processing') || homeBtn.classList.contains('processing')) return;

    isHomeWorkout = (mode === 'home');
    if (isHomeWorkout) {
        homeBtn.classList.add('processing');
    } else {
        gymBtn.classList.add('processing');
    }
   
    loadProgramFromSheets();
}

function openSheet(name) {
    currentEx = name;
    document.getElementById('sheet-ex-name').innerText = name;
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('log-sheet').style.display = 'block';
}

function closeSheet() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('log-sheet').style.display = 'none';
}

async function submitLog() {
    const w = document.getElementById('log-weight').value;
    const r = document.getElementById('log-reps').value;
   
    const payload = {
        action: 'logWorkout',
        client: CLIENT_NAME,
        exercise: currentEx,
        weight: w,
        reps: r,
        date: new Date().toISOString()
    };

    try {
        await fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) });
        alert('Shranjeno!');
        closeSheet();
    } catch(e) {
        alert('Napaka!');
    }
}

window.onload = loadProgramFromSheets;
</script>
</body>
</html>
