<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CoachOS — Hana — Telo</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --lime:      #c8f135;
    --lime-glow: rgba(200,241,53,0.65);
  }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
    color: #fff;
  }

  #page {
    width: 100%;
    height: 100dvh;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  #hdr {
    width: 100%;
    text-align: center;
    padding-top: 20px;
  }

  #hdr .brand {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.28em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
  }

  #hdr .name {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.4rem, 6vw, 1.9rem);
    font-weight: 900;
    letter-spacing: 0.1em;
    color: #fff;
    text-transform: uppercase;
    line-height: 1.2;
    margin-top: 4px;
  }

  /* ── Avatar ── */
  #avatar-section {
    width: 100%;
    max-width: 480px;
    flex-shrink: 0;
  }

  #avatar-front,
  #avatar-back {
    width: 100%;
    display: block;
  }

  #avatar-back { display: none; }

  /* ── Stats ── */
  #stats {
    width: 100%;
    max-width: 480px;
    padding: 0 28px 36px;
    flex-shrink: 0;
  }

  .w-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .w-icon {
    font-size: 1.05rem;
    color: var(--lime);
    filter: drop-shadow(0 0 5px var(--lime));
    line-height: 1;
  }

  .w-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.22rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.04em;
  }

  /* Coach message — hidden until set by dashboard */
  #coach-msg {
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--lime);
    text-shadow: 0 0 6px var(--lime), 0 0 14px rgba(200,241,53,0.45);
    margin-top: -10px;
    margin-bottom: 16px;
    padding-left: 2px;
    display: none;
  }

  #coach-msg.visible { display: block; }

  .meas {
    display: grid;
    grid-template-columns: 1fr 1fr;
    row-gap: 2px;
    column-gap: 16px;
    margin-bottom: 12px;
  }

  .meas-item {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.15rem;
    font-weight: 400;
    color: #fff;
  }

  .hr-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }

  .hr-icon {
    font-size: 1.15rem;
    color: var(--lime);
    filter: drop-shadow(0 0 5px var(--lime));
    animation: hbeat 1.3s ease-in-out infinite;
  }

  @keyframes hbeat {
    0%,100% { transform: scale(1);     opacity: 1; }
    50%      { transform: scale(0.82); opacity: 0.55; }
  }

  .hr-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: #fff;
  }

  .tog-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }

  .tog-lbl {
    font-family: 'Orbitron', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.38);
    transition: color 0.2s, text-shadow 0.2s;
  }

  .tog-lbl.on {
    color: var(--lime);
    text-shadow: 0 0 8px var(--lime);
  }

  .sw { position: relative; display: inline-block; width: 54px; height: 28px; }
  .sw input { display: none; }

  .track {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(200,241,53,0.22);
    border-radius: 28px;
    cursor: pointer;
    transition: background 0.3s, border-color 0.3s;
  }

  .track::before {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    left: 3px; top: 3px;
    background: #555;
    border-radius: 50%;
    transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
  }

  .sw input:checked + .track {
    background: rgba(200,241,53,0.1);
    border-color: var(--lime);
  }

  .sw input:checked + .track::before {
    transform: translateX(26px);
    background: var(--lime);
    box-shadow: 0 0 10px var(--lime), 0 0 22px rgba(200,241,53,0.5);
  }

</style>
</head>
<body>
<div id="page">

  <div id="hdr">
    <div class="brand">CoachOS</div>
    <div class="name">HANA — TELO</div>
  </div>

  <div id="avatar-section">
    <img id="avatar-front" src="hana-cave.jpg" alt="Hana Front">
    <img id="avatar-back"  src="hana-back.png"  alt="Hana Back">
  </div>

  <div id="stats">

    <div class="w-row">
      <span class="w-icon">⚖</span>
      <span class="w-text">Telesna Teža: <span id="val-weight">65.0</span>kg</span>
    </div>

    <div id="coach-msg"></div>

    <div class="meas">
      <div class="meas-item">Pas: <span id="val-pas">70</span>cm</div>
      <div class="meas-item">Boki: <span id="val-boki">95</span>cm</div>
      <div class="meas-item">Prsi: <span id="val-prsi">88</span>cm</div>
      <div class="meas-item">Stegna: <span id="val-stegna">55</span>cm</div>
    </div>

    <div class="hr-row">
      <span class="hr-icon">💚</span>
      <span class="hr-text">Heart Rate: <span id="val-hr">125</span> BPM</span>
    </div>

    <div class="tog-row">
      <span class="tog-lbl on" id="lbl-front">FRONT</span>
      <label class="sw">
        <input type="checkbox" id="view-toggle">
        <span class="track"></span>
      </label>
      <span class="tog-lbl" id="lbl-back">BACK</span>
    </div>

  </div>
</div>

<script>
const SHEETS_URL = 'YOUR_APPS_SCRIPT_URL_HERE';

// Front / Back toggle
const tog      = document.getElementById('view-toggle');
const imgFront = document.getElementById('avatar-front');
const imgBack  = document.getElementById('avatar-back');
const lblFront = document.getElementById('lbl-front');
const lblBack  = document.getElementById('lbl-back');

tog.addEventListener('change', () => {
  const back = tog.checked;
  imgFront.style.display = back ? 'none'  : 'block';
  imgBack.style.display  = back ? 'block' : 'none';
  lblFront.classList.toggle('on', !back);
  lblBack.classList.toggle('on',   back);
});

// Coach message — only appears when set by coach dashboard
function setCoachMessage(msg) {
  const el = document.getElementById('coach-msg');
  if (msg && msg.trim()) {
    el.textContent = msg;
    el.classList.add('visible');
  } else {
    el.classList.remove('visible');
  }
}

// Load from Sheets
async function loadData() {
  if (!SHEETS_URL || SHEETS_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;
  try {
    const res  = await fetch(`${SHEETS_URL}?client=hana&sheet=telo`);
    const data = await res.json();
    if (data.weight)       document.getElementById('val-weight').textContent = data.weight;
    if (data.pas)          document.getElementById('val-pas').textContent    = data.pas;
    if (data.boki)         document.getElementById('val-boki').textContent   = data.boki;
    if (data.prsi)         document.getElementById('val-prsi').textContent   = data.prsi;
    if (data.stegna)       document.getElementById('val-stegna').textContent = data.stegna;
    if (data.hr)           document.getElementById('val-hr').textContent     = data.hr;
    if (data.coachMessage) setCoachMessage(data.coachMessage);
  } catch(e) {
    console.warn('CoachOS Sheets load failed:', e);
  }
}

loadData();
</script>
</body>
</html>
