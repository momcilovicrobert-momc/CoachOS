<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CoachOS — Hana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  /* ═══════════════════════════════════════════
     RESET & BASE
  ═══════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --lime: #c8f135;
    --lime-glow: rgba(200, 241, 53, 0.6);
    --lime-dim: rgba(200, 241, 53, 0.15);
    --dark: #050a00;
    --text: #e8f5d0;
    --sub: rgba(232, 245, 208, 0.55);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
  }

  /* ═══════════════════════════════════════════
     FULL-SCREEN BACKGROUND LAYERS
  ═══════════════════════════════════════════ */
  #bg-cave {
    position: fixed;
    inset: 0;
    background-image: url('obsidian_cave.jpg');
    background-size: cover;
    background-position: center top;
    z-index: 0;
  }

  #bg-hex {
    position: fixed;
    inset: 0;
    background-image: url('honeycomb_grid.png');
    background-size: 420px auto;
    background-repeat: repeat;
    opacity: 0.18;
    z-index: 1;
  }

  /* dark vignette so top/bottom text stays readable */
  #bg-vignette {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 50%, transparent 30%, rgba(0,0,0,0.55) 100%),
      linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 18%, transparent 70%, rgba(0,0,0,0.70) 100%);
    z-index: 2;
  }

  /* ═══════════════════════════════════════════
     MAIN SCROLL CONTAINER
  ═══════════════════════════════════════════ */
  #app {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100dvh;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ═══════════════════════════════════════════
     HEADER
  ═══════════════════════════════════════════ */
  #header {
    width: 100%;
    text-align: center;
    padding: 18px 20px 0;
    flex-shrink: 0;
  }

  #header .brand {
    font-family: 'Orbitron', monospace;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.32em;
    color: var(--sub);
    text-transform: uppercase;
  }

  #header .title {
    font-family: 'Orbitron', monospace;
    font-size: 1.65rem;
    font-weight: 900;
    letter-spacing: 0.12em;
    color: #fff;
    text-transform: uppercase;
    line-height: 1.15;
    margin-top: 4px;
    text-shadow:
      0 0 18px rgba(200,241,53,0.25),
      0 2px 4px rgba(0,0,0,0.8);
  }

  #header .title span {
    color: var(--lime);
  }

  /* ═══════════════════════════════════════════
     AVATAR SECTION
  ═══════════════════════════════════════════ */
  #avatar-wrap {
    width: 100%;
    max-width: 420px;
    position: relative;
    flex-shrink: 0;
    margin-top: -4px;
  }

  #avatar-img {
    width: 100%;
    display: block;
    /* The image itself contains the neon glow — no extra filter needed */
    filter: drop-shadow(0 0 22px rgba(200,241,53,0.35));
  }

  /* ═══════════════════════════════════════════
     STATS PANEL — floats below avatar feet
  ═══════════════════════════════════════════ */
  #stats-panel {
    width: 100%;
    max-width: 420px;
    padding: 0 22px 28px;
    flex-shrink: 0;
  }

  /* Weight row */
  .weight-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 3px;
  }

  .weight-icon {
    font-size: 1rem;
    color: var(--lime);
    filter: drop-shadow(0 0 6px var(--lime));
  }

  .weight-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.18rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.04em;
  }

  .coach-message {
    font-family: 'Orbitron', monospace;
    font-size: 0.62rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--lime);
    text-shadow:
      0 0 8px var(--lime),
      0 0 16px rgba(200,241,53,0.5);
    margin-bottom: 16px;
    padding-left: 2px;
  }

  /* ── Measurement grid ── */
  .meas-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 20px;
    margin-bottom: 14px;
  }

  .meas-item {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.08rem;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.03em;
  }

  .meas-item .key {
    color: var(--sub);
  }

  /* ── Heart rate row ── */
  .hr-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
  }

  .hr-icon {
    font-size: 1.1rem;
    color: var(--lime);
    filter: drop-shadow(0 0 6px var(--lime));
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.6; transform: scale(0.88); }
  }

  .hr-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
  }

  /* ── Toggle row ── */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .toggle-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--sub);
  }

  .toggle-label.active {
    color: var(--lime);
    text-shadow: 0 0 8px var(--lime);
  }

  /* custom toggle switch */
  .switch {
    position: relative;
    display: inline-block;
    width: 52px;
    height: 26px;
  }

  .switch input { display: none; }

  .slider {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(200,241,53,0.25);
    border-radius: 26px;
    cursor: pointer;
    transition: background 0.3s;
  }

  .slider::before {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    left: 3px; top: 3px;
    background: #555;
    border-radius: 50%;
    transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
  }

  .switch input:checked + .slider {
    background: rgba(200,241,53,0.12);
    border-color: var(--lime);
  }

  .switch input:checked + .slider::before {
    transform: translateX(26px);
    background: var(--lime);
    box-shadow: 0 0 10px var(--lime), 0 0 20px rgba(200,241,53,0.5);
  }

  /* ═══════════════════════════════════════════
     BACK-VIEW avatar (hidden by default)
  ═══════════════════════════════════════════ */
  #avatar-back {
    display: none;
    width: 100%;
  }

  /* ═══════════════════════════════════════════
     DIVIDER LINE
  ═══════════════════════════════════════════ */
  .hud-line {
    width: calc(100% - 44px);
    height: 1px;
    background: linear-gradient(to right, transparent, var(--lime-glow), transparent);
    margin: 8px 22px 14px;
    flex-shrink: 0;
  }

</style>
</head>
<body>

<!-- ── Background layers ── -->
<div id="bg-cave"></div>
<div id="bg-hex"></div>
<div id="bg-vignette"></div>

<!-- ── App shell ── -->
<div id="app">

  <!-- Header -->
  <div id="header">
    <div class="brand">CoachOS</div>
    <div class="title">HANA <span>—</span> TELO</div>
  </div>

  <!-- Avatar -->
  <div id="avatar-wrap">
    <img id="avatar-front" src="hana_avatar_front.png" alt="Hana Front" id="avatar-img">
    <img id="avatar-back"  src="hana_avatar_back.png"  alt="Hana Back">
  </div>

  <!-- Divider -->
  <div class="hud-line"></div>

  <!-- Stats panel -->
  <div id="stats-panel">

    <!-- Weight + coach message -->
    <div class="weight-row">
      <span class="weight-icon">⚖</span>
      <span class="weight-label" id="weight-display">Telesna Teža: <span id="val-weight">65.0</span>kg</span>
    </div>
    <div class="coach-message" id="coach-msg-display">Vsak dan, zjutraj, na tešče</div>

    <!-- Measurements -->
    <div class="meas-grid">
      <div class="meas-item"><span class="key">Pas: </span><span id="val-pas">70</span>cm</div>
      <div class="meas-item"><span class="key">Boki: </span><span id="val-boki">95</span>cm</div>
      <div class="meas-item"><span class="key">Prsi: </span><span id="val-prsi">88</span>cm</div>
      <div class="meas-item"><span class="key">Stegna: </span><span id="val-stegna">55</span>cm</div>
    </div>

    <!-- Heart rate -->
    <div class="hr-row">
      <span class="hr-icon">💚</span>
      <span class="hr-label">Heart Rate: <span id="val-hr">125</span> BPM</span>
    </div>

    <!-- Toggle -->
    <div class="toggle-row">
      <span class="toggle-label active" id="lbl-front">FRONT</span>
      <label class="switch">
        <input type="checkbox" id="view-toggle">
        <span class="slider"></span>
      </label>
      <span class="toggle-label" id="lbl-back">BACK</span>
    </div>

  </div><!-- /stats-panel -->

</div><!-- /app -->

<script>
// ═══════════════════════════════════════════
//  CONFIG — edit these to connect to Sheets
// ═══════════════════════════════════════════
const SHEETS_URL = 'YOUR_APPS_SCRIPT_URL_HERE'; // replace with your deployed GAS URL

// ── Dynamic coach message (set by coach dashboard) ──
let coachMessage = 'Vsak dan, zjutraj, na tešče'; // fallback default

// ═══════════════════════════════════════════
//  FRONT / BACK TOGGLE
// ═══════════════════════════════════════════
const toggle   = document.getElementById('view-toggle');
const frontImg = document.getElementById('avatar-front');
const backImg  = document.getElementById('avatar-back');
const lblFront = document.getElementById('lbl-front');
const lblBack  = document.getElementById('lbl-back');

toggle.addEventListener('change', () => {
  if (toggle.checked) {
    frontImg.style.display = 'none';
    backImg.style.display  = 'block';
    lblFront.classList.remove('active');
    lblBack.classList.add('active');
  } else {
    frontImg.style.display = 'block';
    backImg.style.display  = 'none';
    lblFront.classList.add('active');
    lblBack.classList.remove('active');
  }
});

// ═══════════════════════════════════════════
//  LOAD DATA FROM GOOGLE SHEETS
// ═══════════════════════════════════════════
async function loadData() {
  if (!SHEETS_URL || SHEETS_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    applyCoachMessage('Vsak dan, zjutraj, na tešče');
    return;
  }

  try {
    const res  = await fetch(`${SHEETS_URL}?client=hana&sheet=telo`);
    const data = await res.json();

    if (data.weight)       document.getElementById('val-weight').textContent = data.weight;
    if (data.pas)          document.getElementById('val-pas').textContent    = data.pas;
    if (data.boki)         document.getElementById('val-boki').textContent   = data.boki;
    if (data.prsi)         document.getElementById('val-prsi').textContent   = data.prsi;
    if (data.stegna)       document.getElementById('val-stegna').textContent = data.stegna;
    if (data.hr)           document.getElementById('val-hr').textContent     = data.hr;
    if (data.coachMessage) applyCoachMessage(data.coachMessage);

  } catch (err) {
    console.warn('CoachOS: Sheets load failed —', err);
  }
}

function applyCoachMessage(msg) {
  coachMessage = msg;
  document.getElementById('coach-msg-display').textContent = msg;
}

// ── Init ──
loadData();
</script>
</body>
</html>
